name: megafamilia
description: "MegaFamilia — app móvil de MegaISP (control parental + autoservicio cliente + órdenes técnico)."
publish_to: 'none'
version: 0.3.0+3

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP + persistencia + estado + routing
  http: ^1.2.0
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  go_router: ^13.0.0

  # UI / visualización
  fl_chart: ^0.68.0
  cached_network_image: ^3.3.1
  percent_indicator: ^4.2.3
  lottie: ^3.1.0
  intl: ^0.19.0

  # Biometría (Face/Touch ID) — usado opcionalmente al desbloquear la app
  local_auth: ^2.1.8

  # QR scanner. El spec pedía qr_code_scanner ^1.0.1 pero ese paquete está
  # archivado y rompe con AGP moderno por "namespace missing". mobile_scanner
  # es el sucesor mantenido con la misma funcionalidad.
  mobile_scanner: ^5.0.0

  # OTA self-update (en lugar de re-instalar manual cada cambio)
  package_info_plus: ^8.0.0
  url_launcher: ^6.2.5

  # NOTA: firebase_core / firebase_messaging / google_maps_flutter omitidos
  # de v0.1 — requieren google-services.json y Maps API key. Se añaden en una
  # iteración posterior cuando esos secretos estén configurados.

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
